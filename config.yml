          title: "刘江锐 <br><span style='font-size:30px;'>Dr. Jiangrui Liu</span>"
          subtitle: |-
            我是<a href="https://cpa.cqu.edu.cn/" target="_blank" rel="noopener noreferrer">重庆大学公共管理学院</a>的一名教师，<a href="https://www.dps.tsinghua.edu.cn/" target="_blank" rel="noopener noreferrer">清华大学政治学</a>博士。我的研究主要聚焦政治态度与社会观念的变迁（以生命历程为分析视角），并关注国家—社会关系与公共治理中的认知与评价问题，延伸至比较政治、量化研究方法与计算社会科学，对复杂社会现象进行系统性的实证分析。研究兴趣和范围在问题驱动下持续拓展与演进。
            <br>
            I am a faculty member at the School of Public Policy and Administration, <a href="https://english.cqu.edu.cn/" target="_blank" rel="noopener noreferrer">Chongqing University</a>. I received my Ph.D. in Political Science from <a href="https://www.dps.tsinghua.edu.cn/psen/" target="_blank" rel="noopener noreferrer">Tsinghua University</a>. My research agenda lies at the intersection of political attitudes, social change, and governance, with a particular interest in how individual beliefs and preferences evolve across the life course and within broader institutional contexts.<br>
            More broadly, my work engages with questions in comparative politics and the study of public opinion, seeking to understand how states and societies interact under conditions of rapid transformation. I am especially interested in how public opinion is formed, structured, and reshaped across diverse political and social contexts, and how these dynamics inform policy processes and governance outcomes.<br>
            Methodologically, I work extensively with large-scale survey data and computational approaches. My research combines traditional quantitative methods with emerging tools in computational social science and machine learning, with an emphasis on building transparent, replicable, and analytically rigorous frameworks for studying complex social phenomena.<br>
            While my research interests are dynamic and evolving, they are united by a common goal: to bridge micro-level behavioral insights with macro-level political and institutional processes, and to contribute to a more empirically grounded understanding of governance and social change in contemporary societies.
