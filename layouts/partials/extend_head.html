{{- /* 按访客本地时间的昼夜自动选择主题：6:00–18:00 为日间（浅色），其余为夜间（深色） */ -}}
<script>
(function() {
    var h = new Date().getHours();
    localStorage.setItem("pref-theme", (h >= 6 && h < 18) ? "light" : "dark");
})();
</script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=PT+Sans+Narrow:wght@400;700&display=swap" rel="stylesheet">
<style>
  body, body *, .first-entry, .post-content, .entry-content, header, footer, nav, .list, .single { font-family: "PT Sans Narrow", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif !important; }
  .profile_inner h1 {
    font-size: 1.35rem;
    line-height: 1.35;
    font-weight: 700;
  }
  .profile_inner h1 .profile-title-zh {
    font-size: 0.93em;
  }
  .profile_inner h1 .profile-title-en {
    font-size: 1em;
    font-weight: 400;
  }
  .profile_inner span a {
    text-decoration: underline;
    text-underline-offset: 0.15em;
    text-decoration-thickness: from-font;
  }
  .profile_inner span a:hover {
    text-decoration-thickness: 0.12em;
  }
  .profile_inner .profile-subtitle-en {
    font-size: 1.125em;
    line-height: 1.55;
  }
</style>
{{- if .Params.wideContent }}
<style>
  :root {
    --main-width: 960px;
  }
</style>
{{- end }}
